name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.73.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          swift --version

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Build VoiceInk
        run: make local

      - name: Create DMG
        run: |
          APP_PATH="$HOME/Downloads/VoiceInk.app"
          DMG_PATH="VoiceInk.dmg"
          hdiutil create -volname "VoiceInk" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            LATEST_TAG=$(git tag -l 'v[0-9]*' --sort=-version:refname | head -1)
            BASE="${LATEST_TAG:-v0.0.0}"
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="${BASE}+${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VoiceInk ${{ steps.version.outputs.tag }}
          files: VoiceInk.dmg
          generate_release_notes: true

      - name: Compute DMG hash and update nix version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          URL="https://github.com/charliemeyer2000/VoiceInk/releases/download/${TAG}/VoiceInk.dmg"

          # Hash the DMG we just built (already on disk)
          SRI=$(shasum -a 256 VoiceInk.dmg | awk '{print $1}' | xxd -r -p | base64 | sed 's/^/sha256-/')

          mkdir -p nix/versions
          cat > "nix/versions/${VERSION}.json" <<EOF
          {
            "version": "${VERSION}",
            "url": "${URL}",
            "hash": "${SRI}"
          }
          EOF

          git add "nix/versions/${VERSION}.json"
          git commit -m "chore(nix): update version to ${TAG} [skip ci]" || true
          git push origin HEAD:main || true
