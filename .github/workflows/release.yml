name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.73.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          echo "Selected: $XCODE"
          swift --version

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Build VoiceInk
        run: make local

      - name: Create DMG
        run: |
          APP_PATH="$HOME/Downloads/VoiceInk.app"
          DMG_PATH="VoiceInk.dmg"
          hdiutil create -volname "VoiceInk" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            # Push to main — auto-generate a version tag from short SHA
            LATEST_TAG=$(git tag -l 'v[0-9]*' --sort=-version:refname | head -1)
            BASE="${LATEST_TAG:-v0.0.0}"
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="${BASE}+${SHORT_SHA}"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VoiceInk ${{ steps.version.outputs.tag }}
          files: VoiceInk.dmg
          generate_release_notes: true

      - name: Trigger overlay update
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh workflow run update.yml \
            --repo charliemeyer2000/voiceink-overlay \
            -f version="${{ steps.version.outputs.tag }}"
